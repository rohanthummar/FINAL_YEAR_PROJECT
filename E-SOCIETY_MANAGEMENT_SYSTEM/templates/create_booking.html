{% extends 'base.html' %}

{% block content %}

<style>
    .form-container {
        max-width: 600px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .form-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 20px;
        text-align: center;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
    }

    .form-input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    .form-input:focus {
        border-color: #3498db;
        outline: none;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: #f39c12;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background: #e67e22;
    }

    .btn-back {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #555;
        text-decoration: none;
    }

    .btn-back:hover {
        text-decoration: underline;
    }
</style>

<div class="form-container">

    <div class="form-title">🏢 Book Facility</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Select Facility</label>
            <select name="facility" class="form-input" required>
                <option value="">-- Select Facility --</option>
                <option value="Gym">Gym</option>
                <option value="Clubhouse">Clubhouse</option>
                <option value="Swimming Pool">Swimming Pool</option>
                <option value="Community Hall">Community Hall</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Booking Date</label>
            <input type="date" name="date" class="form-input" required>
        </div>

        <button type="submit" class="btn-submit">
            Book Facility
        </button>

    </form>

    <a href="{% url 'resident_dashboard' %}" class="btn-back">← Back to Dashboard</a>

</div>

{% endblock %}
