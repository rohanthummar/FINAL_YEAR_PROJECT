{% extends 'base.html' %}

{% block content %}

<style>
    .page-title {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 20px;
    }

    .bill-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .bill-card {
        background: #fff;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        transition: 0.3s;
    }

    .bill-card:hover {
        transform: translateY(-5px);
    }

    .bill-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 10px;
    }

    .bill-info {
        font-size: 14px;
        color: #555;
        margin-bottom: 8px;
    }

    .status-badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        display: inline-block;
        margin-top: 10px;
    }

    .paid {
        background: #28a745;
        color: white;
    }

    .pending {
        background: #f39c12;
        color: white;
    }
</style>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">

    <h2 style="margin:0;">💰 Maintenance Bills</h2>

    <a href="{% url 'create_bill' %}" 
       style="
       background:#27ae60;
       color:white;
       padding:10px 18px;
       border-radius:8px;
       text-decoration:none;
       font-weight:500;
       ">
       + Add Maintenance Bill
    </a>

</div>

<div class="bill-container">

    {% for bill in bills %}
    <div class="bill-card">

        <div class="bill-title">
            👤 {{ bill.resident }}
        </div>

        <div class="bill-info">
            📅 Month: {{ bill.month }}
        </div>

        <div class="bill-info">
            💵 Amount: ₹ {{ bill.amount }}
        </div>

        <div>
            <span class="status-badge {% if bill.status == 'paid' %}paid{% else %}pending{% endif %}">
                {{ bill.status }}
            </span>
        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
