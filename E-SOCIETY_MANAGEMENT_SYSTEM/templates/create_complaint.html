{% extends 'base.html' %}

{% block content %}

<style>
    .form-container {
        max-width: 650px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .form-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 20px;
        text-align: center;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
    }

    .form-input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    .form-input:focus {
        border-color: #3498db;
        outline: none;
    }

    .form-textarea {
        height: 140px;
        resize: none;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: #e67e22;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background: #d35400;
    }

    .btn-back {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #555;
        text-decoration: none;
    }

    .btn-back:hover {
        text-decoration: underline;
    }
</style>

<div class="form-container">

    <div class="form-title">📝 Create Complaint</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-input" required>
        </div>

        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-input form-textarea" required></textarea>
        </div>

        <button type="submit" class="btn-submit">
            Submit Complaint
        </button>

    </form>

    <a href="{% url 'resident_dashboard' %}" class="btn-back">← Back to Dashboard</a>

</div>

{% endblock %}
