{% extends "base.html" %}

{% block content %}

<h2>Announcements</h2>

<div class="announcement-grid">

{% for a in announcements %}
<div class="announcement-card">
<h3>{{ a.title }}</h3>
<p>{{ a.message }}</p>
<small>{{ a.created_at }}</small>
</div>
{% endfor %}

</div>

{% endblock %}
