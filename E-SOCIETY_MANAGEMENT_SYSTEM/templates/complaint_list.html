<h2>Complaints</h2>

<table border="1">

<tr>
<th>Title</th>
<th>Description</th>
<th>Status</th>
<th>Date</th>
</tr>

{% for complaint in complaints %}

<tr>

<td>{{ complaint.title }}</td>

<td>{{ complaint.description }}</td>

<td>{{ complaint.status }}</td>

<td>{{ complaint.created_at }}</td>

</tr>

{% endfor %}

</table>
